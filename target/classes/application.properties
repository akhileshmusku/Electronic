spring.application.name=swiftcart-backend

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/swiftcart_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=M.YvS@1337
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.root=WARN
logging.level.com.swiftcart=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=your_jwt_secret_key_change_this_in_production_environment_12345
jwt.expiration=604800000

# CORS Configuration
cors.allowedOrigins=http://localhost:3000,http://localhost:8000,http://localhost:8080

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
